<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0E1013">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Krachtboek">
<title>Krachtboek</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root{--bg:#0F1228;--card:#181C38;--card2:#20254A;--line:#2B315C;--chalk:#EEF0FF;--text:#D2D6F0;--muted:#9094C0;--faint:#61648C;--train:#34E2C0;--train-soft:rgba(52,226,192,.15);--fuel:#9D86FF;--fuel-soft:rgba(157,134,255,.15);--danger:#FF6B81;--in:#0B0E20;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{font-family:'Quicksand',system-ui,-apple-system,sans-serif;color:var(--text);background-color:var(--bg);background-image:radial-gradient(820px 480px at 12% 0%, rgba(52,226,192,.12), transparent 58%),radial-gradient(820px 560px at 100% 100%, rgba(157,134,255,.15), transparent 55%);background-repeat:no-repeat;-webkit-font-smoothing:antialiased;}
.mono{font-family:'IBM Plex Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums;}
button{font-family:inherit;} input{font-family:inherit;}
::-webkit-scrollbar{width:0;height:0;}
.press{transition:transform .08s ease, opacity .15s ease;}
.press:active{transform:scale(.97);opacity:.85;}
.press:focus-visible{outline:2px solid var(--train);outline-offset:2px;border-radius:8px;}
.wrap{min-height:100dvh;display:flex;flex-direction:column;}
header{position:sticky;top:0;z-index:20;background:rgba(15,18,40,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:calc(14px + env(safe-area-inset-top)) 18px 12px;display:flex;align-items:center;justify-content:space-between;}
.brand{font-family:'Fredoka',system-ui,sans-serif;font-size:22px;font-weight:700;color:var(--chalk);letter-spacing:0;line-height:1;}
.brand b{font-weight:700;background:linear-gradient(90deg,#34E2C0,#9D86FF,#FF7EC7);-webkit-background-clip:text;background-clip:text;color:transparent;}
.tag{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-top:4px;}
.icon-btn{background:var(--card);border:1px solid var(--line);border-radius:11px;width:40px;height:40px;display:grid;place-items:center;color:var(--muted);cursor:pointer;}
main{flex:1;overflow-y:auto;padding:18px 18px 100px;max-width:560px;width:100%;margin:0 auto;}
.stack{display:flex;flex-direction:column;gap:18px;}
.nav{position:fixed;bottom:0;left:0;right:0;z-index:20;background:rgba(15,18,40,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;padding:8px 10px calc(8px + env(safe-area-inset-bottom));}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;padding:6px 0;}
.nav-btn span{font-size:11px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;}
.section-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-weight:600;}
.empty{border:1px dashed var(--line);border-radius:14px;padding:22px 16px;text-align:center;color:var(--muted);font-size:13.5px;}
.gauge-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.gauge{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px 14px;}
.gauge-label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.gauge-val{display:flex;align-items:baseline;gap:4px;}
.num-big{font-size:24px;font-weight:600;color:var(--chalk);line-height:1;}
.num-target{font-size:13px;color:var(--faint);}
.bar{height:6px;background:var(--in);border-radius:99px;overflow:hidden;margin:10px 0 7px;}
.bar-fill{height:100%;border-radius:99px;transition:width .35s ease;}
.gauge-rem{font-size:11px;}
.pips{display:flex;gap:5px;}
.pip{width:10px;height:10px;border-radius:99px;background:var(--line);transition:background .3s ease;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:12px 16px;border-radius:11px;border:none;font-weight:600;font-size:14px;cursor:pointer;color:#10130F;}
.btn.full{width:100%;} .btn.sm{padding:8px 12px;font-size:13px;}
.btn-train{background:linear-gradient(135deg,#3DEBCB,#2FC9E0);box-shadow:0 4px 20px rgba(52,226,192,.30);} .btn-fuel{background:linear-gradient(135deg,#A78BFF,#7C7CFF);box-shadow:0 4px 20px rgba(157,134,255,.30);}
.btn-danger{background:var(--danger);color:#fff;}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--text);}
.linkbtn{background:none;border:none;color:var(--train);font-weight:600;font-size:12.5px;cursor:pointer;padding:0;display:inline-flex;align-items:center;gap:5px;}
.linkbtn.faint{color:var(--faint);} .linkbtn.fuel{color:var(--fuel);}
.field{display:flex;align-items:center;background:var(--in);border:1px solid var(--line);border-radius:10px;padding:0 10px;flex:1;min-width:0;}
.field input{width:100%;min-width:0;background:none;border:none;outline:none;color:var(--chalk);font-size:15px;padding:10px 0;}
.field .suffix{font-size:12px;padding-left:4px;}
.text-input{width:100%;background:var(--in);border:1px solid var(--line);border-radius:10px;color:var(--chalk);padding:12px;font-size:15px;outline:none;}
input::placeholder{color:#5a6068;}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
input[type=number]{-moz-appearance:textfield;}
.lbl{font-size:11px;color:var(--faint);margin-bottom:5px;padding-left:2px;}
.daycard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;text-align:left;width:100%;color:var(--chalk);}
.badge{font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:99px;font-weight:700;background:var(--in);color:var(--muted);border:1px solid var(--line);}
.iconlink{background:none;border:none;color:var(--faint);cursor:pointer;padding:6px;display:inline-flex;}
.row{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px;}
.overlay{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;}
.sheet{background:var(--bg);border-top:1px solid var(--line);border-radius:22px 22px 0 0;width:100%;max-width:560px;max-height:88dvh;overflow-y:auto;padding:20px 18px calc(20px + env(safe-area-inset-bottom));animation:up .25s ease;}
@keyframes up{from{transform:translateY(100%);}to{transform:translateY(0);}}
.datebar{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:6px 8px;}
.arrow{background:none;border:none;cursor:pointer;color:var(--text);padding:8px 12px;display:grid;place-items:center;}
.arrow.disabled{opacity:.3;cursor:default;}
.target-hint{font-size:11.5px;color:var(--muted);margin-bottom:10px;}
.last-line{font-size:11.5px;color:var(--train);margin-bottom:12px;}
.set-head{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.set-head .sh{flex:1;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);text-align:center;}
.set-head .sp{width:24px;}
.set-row{display:flex;align-items:center;gap:6px;margin-bottom:7px;}
.set-row .setnum{width:24px;font-size:13px;color:var(--faint);text-align:center;}
.set-row .field{padding:0 6px;}
.set-row .field input{font-size:14px;padding:9px 0;text-align:center;}
.pday{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;}
.pname{width:100%;background:var(--in);border:1px solid var(--line);border-radius:9px;color:var(--chalk);font-size:15px;font-weight:700;padding:9px 10px;outline:none;}
.pex{display:flex;align-items:center;gap:6px;margin-top:8px;}
.pex .nm{flex:1;background:var(--in);border:1px solid var(--line);border-radius:9px;color:var(--text);font-size:14px;padding:8px 9px;outline:none;min-width:0;}
.mini{width:46px;flex:none;}
.mini input{text-align:center;padding:8px 0;font-size:13px;}
.tchip{font-size:12px;padding:6px 12px;border-radius:99px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;}
.tchip.on{background:var(--fuel-soft);color:var(--fuel);border-color:transparent;}
.ico{display:inline-flex;}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important;}}
.mgrow{display:flex;gap:8px;margin:4px 0 12px}
.mgsel{flex:1;min-width:0;background:var(--card2);color:var(--text);border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:12.5px;font-family:inherit;-webkit-appearance:none;appearance:none}
.pexwrap .pex{margin-bottom:0}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pcard{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.pcard .pimg{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;background:#000}
.pdate{width:100%;background:var(--card2);color:var(--text);border:none;border-top:1px solid var(--line);padding:7px 9px;font-size:11.5px;font-family:inherit;-webkit-appearance:none;appearance:none;text-align:center}
.cmp{position:relative;width:100%;aspect-ratio:3/4;border-radius:14px;overflow:hidden;background:#000}
.cmp img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.cmp .cmpline{position:absolute;top:0;bottom:0;width:2px;background:#fff;box-shadow:0 0 0 1px rgba(0,0,0,.35);pointer-events:none}
.cmprange{width:100%;margin-top:12px;accent-color:var(--train)}
</style>
</head>
<body>
<div id="app" class="wrap"></div>
<input type="file" id="import-file" accept="application/json,.json" style="display:none">
<script>
"use strict";

const PATHS={
  grid:'<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>',
  dumbbell:'<path d="M6 5v14M18 5v14M3 8v8M21 8v8M6 12h12"/>',
  food:'<path d="M5 3v8a2 2 0 0 0 4 0V3M7 11v10M17 3c-1.6 0-2.6 2.2-2.6 5.2 0 2.6 1.1 3.8 2.6 3.8s2.6-1.2 2.6-3.8C19.6 5.2 18.6 3 17 3zM17 16v5"/>',
  plus:'<path d="M12 5v14M5 12h14"/>', trash:'<path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/>',
  gear:'<circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l1.8 1.8M17.2 17.2L19 19M19 5l-1.8 1.8M6.8 17.2L5 19"/>',
  cl:'<path d="M15 6l-6 6 6 6"/>', cr:'<path d="M9 6l6 6-6 6"/>', cd:'<path d="M6 9l6 6 6-6"/>', cu:'<path d="M6 15l6-6 6 6"/>',
  x:'<path d="M6 6l12 12M18 6L6 18"/>', check:'<path d="M5 12l5 5 9-11"/>',
  flame:'<path d="M12 3c2 4 5 5 5 9a5 5 0 0 1-10 0c0-2 1-3 2-4 0 2 1 3 3 3 0-3-2-4 0-8z"/>',
  save:'<path d="M5 3h11l3 3v15H5z"/><path d="M8 3v6h7M8 21v-6h8v6"/>',
  pencil:'<path d="M4 20h4L19 9l-4-4L4 16z"/><path d="M14 6l4 4"/>',
  download:'<path d="M12 3v12M7 11l5 5 5-5M5 21h14"/>', upload:'<path d="M12 21V9M7 13l5-5 5 5M5 3h14"/>',
  search:'<circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/>',
  scale:'<rect x="4" y="4" width="16" height="16" rx="3"/><path d="M9 9.5a3 3 0 0 1 6 0"/><path d="M12 9.5l1.6-1.2"/>',
  bars:'<path d="M3 21h18"/><path d="M7 21v-6M12 21v-11M17 21v-8"/>',
  trend:'<path d="M3 17l6-6 4 4 7-7"/><path d="M17 7h4v4"/>',
  camera:'<rect x="3" y="7" width="18" height="13" rx="3"/><path d="M9 7l1.5-2.5h3L15 7"/><circle cx="12" cy="13.5" r="3.2"/>',
  play:'<path d="M8 5l11 7-11 7z"/>',
  pause:'<path d="M9 5v14M15 5v14"/>',
  pulse:'<path d="M3 12h4l2-5 4 10 2-5h6"/>',
  circle:'<circle cx="12" cy="12" r="8"/>'
};
function icon(name,size,color){ size=size||20; const c=color?'color:'+color+';':''; const fill=(name==='star'||name==='play')?'currentColor':'none'; return '<span class="ico" style="'+c+'width:'+size+'px;height:'+size+'px"><svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="'+fill+'" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(PATHS[name]||'')+'</svg></span>'; }

let _uid=Date.now();
function uid(){ return ++_uid; }

function seedProgram(){
  const days=[
    ['Lower 1','Lower',[['RDL',3,4],['Hip thrust',3,3],['Leg extension',4,3],['Calf raise',4,4]]],
    ['Upper 1','Upper',[['Machine chest press',4,4],['T-bar row',3,3],['Shoulder press',4,3],['Cable pulldown',4,3],['Single-arm extension',4,4]]],
    ['Lower 2','Lower',[['Pendulum squat',4,4],['Leg extension',3,4],['Calf raise',3,3],['Hip thrust',4,3],['Leg curl',3,4],['Cable side kick',2,4]]],
    ['Upper 2','Upper',[['Incline DB chest press',3,4],['Unilateral cable row',3,3],['Cable chest fly',4,3],['Shoulder press',2,4],['Biceps rope',4,4]]],
    ['Lower 3','Lower',[]]
  ];
  return days.map(d=>({id:uid(),name:d[0],type:d[1],exercises:d[2].map(e=>({id:uid(),name:e[0],sets:e[1],rir:e[2]}))}));
}
function seedFoods(){ return [
  {id:uid(),name:'Magere kwark',unit:'100g',per:{calories:57,protein:10,carbs:4,fat:0.2},price:0.20,priceDate:todayStr()},
  {id:uid(),name:'Ei (groot)',unit:'stuk',per:{calories:74,protein:6,carbs:0.6,fat:5.3},price:0.30,priceDate:todayStr()},
  {id:uid(),name:'Kipfilet',unit:'100g',per:{calories:120,protein:23,carbs:0,fat:2.5},price:1.00,priceDate:todayStr()}
]; }

const KEY='krachtboek_v1';
const DEFAULTS={
  targets:{calories:2000,protein:160,carbs:180,fat:65}, weekly:{lower:3,upper:2},
  nutrition:{}, workouts:[], foodLib:[], foods:null, weights:{}, indexRate:0, cardio:[], cardioTimer:{running:false,startTs:0,accumMs:0}, meals:[], schedule:[], scheduleDone:{}, program:seedProgram(),
  tab:'vandaag', foodDate:null, weightDate:null, activeWorkout:null
};
function load(){ try{ const raw=localStorage.getItem(KEY); if(raw) return Object.assign({},DEFAULTS,JSON.parse(raw)); }catch(e){} return JSON.parse(JSON.stringify(DEFAULTS)); }
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(S)); }catch(e){} }
let S=load();
if(!S.foodDate) S.foodDate=todayStr();
if(!S.weightDate) S.weightDate=todayStr();
if(!S.weights) S.weights={};
if(!S.program||!S.program.length) S.program=seedProgram();
if(!S.foods){ const mig=(S.foodLib||[]).map(f=>({id:uid(),name:f.name,unit:'stuk',per:{calories:f.calories||0,protein:f.protein||0,carbs:f.carbs||0,fat:f.fat||0}})); S.foods=mig.length?mig:seedFoods(); }
S.foods.forEach(f=>{ if(f.price==null)f.price=0; if(!f.priceDate)f.priceDate=todayStr(); });
if(S.indexRate==null) S.indexRate=0;
if(!Array.isArray(S.cardio)) S.cardio=[];
if(!S.cardioTimer) S.cardioTimer={running:false,startTs:0,accumMs:0};
if(!Array.isArray(S.meals)) S.meals=[];
if(!Array.isArray(S.schedule)) S.schedule=[];
if(!S.scheduleDone||typeof S.scheduleDone!=='object') S.scheduleDone={};
S.program.forEach(function(d){ d.exercises.forEach(function(ex){ if(ex.muscle==null)ex.muscle=guessMuscle(ex.name); if(ex.muscle2==null)ex.muscle2=''; }); });

let expanded={}, pendingDel=null, pendingDelDay=null, confirmReset=false, showSettings=false, progEdit=false, kcalManual=false, foodsEdit=false, amountSheet=null, manualOpen=false, volumeView=false, volWeek=null, progView=false, progEx=null, photoView=false, photoMode='gallery', cmpA=null, cmpB=null, cmpPos=50, pendingDelPhoto=null, cardioView=false, cardioType='wandelen', cardioManualOpen=false, cardioWeek=null, pendingDelCardio=null, cardioInterval=null, mealEdit=null, mealDelConfirm=false, planEdit=false;
let photoCache=[], photosReady=false;

function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function pad(n){ return String(n).padStart(2,'0'); }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function parseDate(s){ const a=s.split('-').map(Number); return new Date(a[0],a[1]-1,a[2]); }
function shiftDate(s,n){ const d=parseDate(s); d.setDate(d.getDate()+n); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function fmtDate(s){ const t=todayStr(); if(s===t)return'Vandaag'; if(s===shiftDate(t,-1))return'Gisteren'; if(s===shiftDate(t,1))return'Morgen'; return parseDate(s).toLocaleDateString('nl-BE',{weekday:'short',day:'numeric',month:'short'}).replace('.',''); }
function weekDates(ref){ const d=parseDate(ref); const o=(d.getDay()+6)%7; d.setDate(d.getDate()-o); const out=[]; for(let i=0;i<7;i++){ out.push(d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())); d.setDate(d.getDate()+1);} return out; }
function gv(id){ const el=document.getElementById(id); return el?el.value:''; }
function r1(x){ return Math.round(x*10)/10; }
function eur(n){ return '€ '+(Number(n)||0).toFixed(2).replace('.',','); }
function yearsBetween(a,b){ return (parseDate(b)-parseDate(a))/(365.25*24*3600*1000); }
function foodEffPrice(f,onDate){ const base=+f.price||0; const yrs=yearsBetween(f.priceDate||onDate,onDate); return base*Math.pow(1+(+S.indexRate||0)/100, yrs); }

function totalsFor(date){ const a=S.nutrition[date]||[]; return a.reduce((x,e)=>({calories:x.calories+(+e.calories||0),protein:x.protein+(+e.protein||0),carbs:x.carbs+(+e.carbs||0),fat:x.fat+(+e.fat||0)}),{calories:0,protein:0,carbs:0,fat:0}); }
function weekCount(){ const wk=weekDates(todayStr()); let l=0,u=0; S.workouts.forEach(s=>{ if(!wk.includes(s.date))return; if(s.type==='Lower')l++; else if(s.type==='Upper')u++; }); return {lower:l,upper:u}; }
function sessionVolume(s){ return s.exercises.reduce((a,e)=>a+e.sets.reduce((y,st)=>y+(+st.weight||0)*(+st.reps||0),0),0); }
function totalSets(s){ return s.exercises.reduce((a,e)=>a+e.sets.length,0); }
function lastTimeFor(name){ const lc=name.toLowerCase(); const m=S.workouts.filter(s=>s.exercises.some(e=>e.name.toLowerCase()===lc)).sort((a,b)=> a.date<b.date?1:a.date>b.date?-1:b.id-a.id)[0]; if(!m)return null; const ex=m.exercises.find(e=>e.name.toLowerCase()===lc); return {date:m.date,sets:ex.sets}; }
function buildSetsForExercise(name,targetSets){ const last=lastTimeFor(name); const target=Math.max(1,targetSets||1); const count=(last&&last.sets.length)?Math.max(target,last.sets.length):target; const out=[]; for(let i=0;i<count;i++){ const src=(last&&last.sets.length)?(last.sets[i]||last.sets[last.sets.length-1]):null; out.push({id:uid(),weight:src&&src.weight!=null?src.weight:'',reps:src&&src.reps!=null?src.reps:'',rir:src&&src.rir!=null?src.rir:''}); } return out; }
function exNames(){ const set={}; S.program.forEach(d=>d.exercises.forEach(e=>set[e.name]=1)); S.workouts.forEach(s=>s.exercises.forEach(e=>set[e.name]=1)); return Object.keys(set); }
const MUSCLES=[{k:'glutes',l:'Bilspieren'},{k:'quads',l:'Quadriceps'},{k:'hamstrings',l:'Hamstrings'},{k:'calves',l:'Kuiten'},{k:'back',l:'Rug'},{k:'chest',l:'Borst'},{k:'shoulders',l:'Schouders'},{k:'biceps',l:'Biceps'},{k:'triceps',l:'Triceps'},{k:'abs',l:'Buik'}];
function muscleLabel(k){ const m=MUSCLES.find(x=>x.k===k); return m?m.l:'—'; }
function guessMuscle(name){ const s=(name||'').toLowerCase(); const has=arr=>arr.some(w=>s.indexOf(w)>=0);
  if(has(['hip thrust','thrust','glute','bil','kick','abduct','bridge']))return 'glutes';
  if(has(['leg curl','ham curl','hamstring','rdl','romanian','deadlift','good morning','nordic']))return 'hamstrings';
  if(has(['leg extension','squat','hack','pendulum','lunge','leg press','sissy']))return 'quads';
  if(has(['calf','kuit','calve','soleus']))return 'calves';
  if(has(['row','roei','pulldown','pull-down','lat ','lat-','pull up','pull-up','pullup','t-bar','tbar','trek','rug']))return 'back';
  if(has(['chest','bench','borst','fly','flye','pec','dip']))return 'chest';

function e1rm(w,reps){ w=+w||0; reps=+reps||0; if(w<=0||reps<=0)return 0; return w*(1+reps/30); }
function exSeries(name){ const lc=(name||'').toLowerCase(); const out=[]; S.workouts.forEach(function(s){ let best=0,tw=0,found=false; s.exercises.forEach(function(ex){ if((ex.name||'').toLowerCase()!==lc)return; found=true; ex.sets.forEach(function(st){ const v=e1rm(st.weight,st.reps); if(v>best)best=v; const w=+st.weight||0; if(w>tw)tw=w; }); }); if(found&&best>0)out.push({date:s.date,e1rm:best,topWeight:tw}); }); out.sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:0;}); return out; }
function historyExNames(){ const seen={}; const out=[]; S.workouts.forEach(function(s){ s.exercises.forEach(function(ex){ const n=ex.name; if(n&&!seen[n.toLowerCase()]){ seen[n.toLowerCase()]=1; out.push(n); } }); }); return out; }
function suggestLoad(name,targetRir){ const last=lastTimeFor(name); if(!last||!last.sets||!last.sets.length)return null; const sets=last.sets.filter(function(s){return (+s.weight||0)>0&&(+s.reps||0)>0&&s.rir!==''&&s.rir!=null;}); if(!sets.length)return null; const avgRir=sets.reduce(function(a,s){return a+(+s.rir||0);},0)/sets.length; let topWeight=0; sets.forEach(function(s){ const w=+s.weight||0; if(w>topWeight)topWeight=w; }); if(targetRir==null)targetRir=2; const diff=avgRir-targetRir; let factor; if(diff>=2)factor=1.05; else if(diff<=-1.5)factor=0.95; else factor=1.025; const step=topWeight<20?1.25:2.5; let w=Math.round((topWeight*factor)/step)*step; if(factor>1&&w<=topWeight)w=topWeight+step; if(factor<1&&w>=topWeight)w=topWeight-step; if(w<0)w=0; return {weight:w,delta:Math.round((w-topWeight)*100)/100,avgRir:Math.round(avgRir*10)/10}; }
function lineChartSVG(vals,labels){ if(!vals||vals.length===0)return '<div class="empty">Geen data.</div>'; const W=300,H=130,padL=10,padR=10,padT=16,padB=22; let min=Math.min.apply(null,vals),max=Math.max.apply(null,vals); const span=(max-min)||1; const n=vals.length; const X=function(i){return n===1?W/2:padL+i*(W-padL-padR)/(n-1);}; const Y=function(v){return padT+(1-(v-min)/span)*(H-padT-padB);}; const pts=vals.map(function(v,i){return X(i).toFixed(1)+','+Y(v).toFixed(1);}).join(' '); const dots=vals.map(function(v,i){return '<circle cx="'+X(i).toFixed(1)+'" cy="'+Y(v).toFixed(1)+'" r="3" fill="var(--train)"/>';}).join(''); const line=n>1?'<polyline points="'+pts+'" fill="none" stroke="var(--train)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>':''; const fmtShort=function(d){return parseDate(d).toLocaleDateString('nl-BE',{day:'numeric',month:'short'}).replace('.','');}; const yMax='<text x="'+padL+'" y="11" fill="var(--faint)" font-size="9" font-family="monospace">'+fmtSetsNum(max)+' kg</text>'; const xF='<text x="'+padL+'" y="'+(H-7)+'" fill="var(--faint)" font-size="9" font-family="monospace">'+fmtShort(labels[0])+'</text>'; const xL=n>1?'<text x="'+(W-padR)+'" y="'+(H-7)+'" text-anchor="end" fill="var(--faint)" font-size="9" font-family="monospace">'+fmtShort(labels[n-1])+'</text>':''; return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block;overflow:visible">'+line+dots+yMax+xF+xL+'</svg>'; }
function progressHTML(){ const names=historyExNames(); const head='<div style="display:flex;align-items:center;gap:8px"><button class="iconlink press" data-action="progress-close" aria-label="Terug">'+icon('cl',20,'var(--text)')+'</button><span style="font-size:20px;font-weight:700;color:var(--chalk)">Vooruitgang &amp; PR\'s</span></div>'; if(names.length===0)return '<div class="stack">'+head+'<div class="empty">Nog geen sessies gelogd. Log eerst een training.</div></div>'; const cur=(progEx&&names.indexOf(progEx)>=0)?progEx:names[0]; const sel='<select class="mgsel" data-progex="1" style="margin-top:2px">'+names.map(function(n){return '<option'+(n===cur?' selected':'')+'>'+esc(n)+'</option>';}).join('')+'</select>'; const series=exSeries(cur); if(series.length===0)return '<div class="stack">'+head+sel+'<div class="empty">Nog geen gewicht/reps gelogd voor deze oefening.</div></div>'; let bestP=series[0],bestW=series[0],first=series[0],latest=series[series.length-1]; series.forEach(function(p){ if(p.e1rm>bestP.e1rm)bestP=p; if(p.topWeight>bestW.topWeight)bestW=p; }); const trend=latest.e1rm-first.e1rm; const fmtShort=function(d){return parseDate(d).toLocaleDateString('nl-BE',{day:'numeric',month:'short'}).replace('.','');}; const stat=function(label,val,sub){return '<div style="flex:1"><div style="font-size:11px;color:var(--muted);margin-bottom:3px">'+label+'</div><div class="mono" style="font-size:19px;color:var(--chalk)">'+val+'</div><div class="mono" style="font-size:10.5px;color:var(--faint);margin-top:2px">'+sub+'</div></div>';}; const chart=lineChartSVG(series.map(function(p){return p.e1rm;}),series.map(function(p){return p.date;})); const trendTxt=Math.abs(trend)<0.05?'<span style="color:var(--faint)">geen verschil</span>':(trend>0?'<span style="color:var(--train)">▲ '+fmtSetsNum(trend)+' kg</span>':'<span style="color:#FF7EC7">▼ '+fmtSetsNum(-trend)+' kg</span>'); const recent=series.slice().reverse().slice(0,5).map(function(p){return '<div style="display:flex;justify-content:space-between;border-top:1px solid var(--line);padding:8px 0"><span class="mono" style="font-size:12.5px;color:var(--muted)">'+fmtShort(p.date)+'</span><span class="mono" style="font-size:12.5px;color:var(--text)">'+fmtSetsNum(p.e1rm)+' kg <span style="color:var(--faint)">· top '+fmtSetsNum(p.topWeight)+'</span></span></div>';}).join(''); return '<div class="stack">'+head+sel+'<div class="card" style="display:flex;gap:12px">'+stat('PR (gesch. 1RM)',fmtSetsNum(bestP.e1rm)+' kg',fmtShort(bestP.date))+stat('Zwaarste set',fmtSetsNum(bestW.topWeight)+' kg',fmtShort(bestW.date))+'</div>'+'<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><span class="section-label">Geschatte 1RM-trend</span><span class="mono" style="font-size:11.5px">'+trendTxt+'</span></div>'+chart+'</div>'+'<div class="card"><div class="section-label" style="margin-bottom:2px">Recente sessies</div>'+recent+'</div>'+'<div class="target-hint">Geschatte 1RM = gewicht × (1 + reps/30), Epley-formule. De PR is je hoogste geschatte 1RM ooit voor deze oefening.</div></div>'; }
const CARDIO=[{k:'wandelen',l:'Wandelen',met:3.5},{k:'stevig_wandelen',l:'Stevig wandelen',met:4.3},{k:'hardlopen',l:'Hardlopen',met:9.0},{k:'fietsen',l:'Fietsen',met:7.0},{k:'hometrainer',l:'Hometrainer',met:7.0},{k:'crosstrainer',l:'Crosstrainer',met:7.0},{k:'roeien',l:'Roeimachine',met:7.0},{k:'zwemmen',l:'Zwemmen',met:7.0},{k:'stairmaster',l:'Stairmaster',met:9.0},{k:'springtouw',l:'Springtouw',met:11.0},{k:'hiit',l:'HIIT',met:8.0},{k:'anders',l:'Anders',met:6.0}];
function cardioMet(k){ const c=CARDIO.find(function(x){return x.k===k;}); return c?c.met:6.0; }
function cardioLabel(k){ const c=CARDIO.find(function(x){return x.k===k;}); return c?c.l:(k||'Cardio'); }
function latestWeight(){ const ks=Object.keys(S.weights).filter(function(k){var v=S.weights[k];return v!=null&&v!=='';}).sort(); if(!ks.length)return null; return +S.weights[ks[ks.length-1]]; }
function cardioKcal(typeKey,minutes){ const kg=latestWeight()||75; return Math.round(cardioMet(typeKey)*3.5*kg/200*(+minutes||0)); }
function cardioElapsedMs(){ const tm=S.cardioTimer||{}; return (tm.accumMs||0)+(tm.running&&tm.startTs?(Date.now()-tm.startTs):0); }
function fmtClock(ms){ let s=Math.floor(ms/1000); const h=Math.floor(s/3600); s-=h*3600; const m=Math.floor(s/60); s-=m*60; const p=function(n){return (n<10?'0':'')+n;}; return (h>0?h+':':'')+p(m)+':'+p(s); }
function fmtDur(secs){ secs=Math.round(secs||0); if(secs<60)return secs+' s'; const m=Math.round(secs/60); if(m<60)return m+' min'; const h=Math.floor(m/60); return h+' u '+(m-h*60)+' min'; }
function cardioTypeSelect(id,sel){ return '<select class="mgsel" id="'+id+'"'+(id==='cardio-type'?' data-cardiotype="1"':'')+'>'+CARDIO.map(function(c){return '<option value="'+c.k+'"'+(c.k===sel?' selected':'')+'>'+c.l+'</option>';}).join('')+'</select>'; }
function tickCardio(){ const el=document.getElementById('cardio-clock'); if(!el||!S.cardioTimer||!S.cardioTimer.running){ if(cardioInterval){clearInterval(cardioInterval);cardioInterval=null;} return; } const ms=cardioElapsedMs(); el.textContent=fmtClock(ms); const ke=document.getElementById('cardio-kcal-est'); if(ke)ke.textContent='~ '+cardioKcal(cardioType,ms/60000)+' kcal'; }
function ensureCardioTick(){ if(S.cardioTimer&&S.cardioTimer.running&&!cardioInterval){ cardioInterval=setInterval(tickCardio,1000); } }
function cardioWeekRef(){ return cardioWeek||todayStr(); }
function cardioForWeek(ref){ const wk=weekDates(ref); const list=S.cardio.filter(function(e){return wk.indexOf(e.date)>=0;}); let secs=0,kcal=0; const byType={}; list.forEach(function(e){ secs+=(+e.seconds||0); kcal+=(+e.kcal||0); const k=e.type||'anders'; if(!byType[k])byType[k]={secs:0,kcal:0,n:0}; byType[k].secs+=(+e.seconds||0); byType[k].kcal+=(+e.kcal||0); byType[k].n++; }); return {list:list,secs:secs,kcal:kcal,byType:byType,count:list.length}; }

function volWeekRef(){ return volWeek||todayStr(); }
function weekRangeLabel(ref){ const wk=weekDates(ref); const cur=weekDates(todayStr()); if(wk[0]===cur[0])return 'Deze week'; if(wk[0]===weekDates(shiftDate(todayStr(),-7))[0])return 'Vorige week'; const f=function(d){return parseDate(d).toLocaleDateString('nl-BE',{day:'numeric',month:'short'}).replace('.','');}; return f(wk[0])+' – '+f(wk[6]); }
function muscleSelect(exId,slot,val,half){ let opts='<option value=""'+(!val?' selected':'')+'>'+(half?'+ 2e spier (½)':'— spier')+'</option>'; MUSCLES.forEach(function(m){ opts+='<option value="'+m.k+'"'+(val===m.k?' selected':'')+'>'+m.l+(half?' (½)':'')+'</option>'; }); return '<select class="mgsel" data-mg="'+exId+'" data-mgslot="'+slot+'" aria-label="spiergroep">'+opts+'</select>'; }
function fmtSetsNum(n){ return (Math.round(n*10)/10).toString().replace('.',','); }
function volBand(n){ if(n>=10&&n<=20)return 'var(--train)'; if(n>20)return '#FF7EC7'; return '#F2B05E'; }
function volumeHTML(){
  const ref=volWeekRef(); const wk=weekDates(ref); const cur=weekDates(todayStr()); const isCurrent=wk[0]===cur[0];
  const vol=volumeForWeek(ref); const prev=volumeForWeek(shiftDate(ref,-7));
  const sessions=S.workouts.filter(function(s){return wk.indexOf(s.date)>=0;});
  let totalSetsW=0,totalTon=0; MUSCLES.forEach(function(m){ totalSetsW+=vol[m.k].sets; totalTon+=vol[m.k].ton; });
  const active=MUSCLES.filter(function(m){return vol[m.k].sets>0;}).sort(function(a,b){return vol[b.k].sets-vol[a.k].sets;});
  const zero=MUSCLES.filter(function(m){return vol[m.k].sets===0;});
  let maxSets=20; active.forEach(function(m){ if(vol[m.k].sets>maxSets)maxSets=vol[m.k].sets; });
  const rows=active.map(function(m){ const n=vol[m.k].sets; const pn=prev[m.k]?prev[m.k].sets:0; const d=n-pn; const pct=Math.min(100,Math.round(n/maxSets*100)); const c=volBand(n);
    const delta=Math.abs(d)<0.05?'<span style="color:var(--faint)">=</span>':(d>0?'<span style="color:var(--train)">▲ '+fmtSetsNum(d)+'</span>':'<span style="color:#FF7EC7">▼ '+fmtSetsNum(-d)+'</span>');
    return '<div style="margin-bottom:15px"><div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px"><span style="font-size:14px;color:var(--text)">'+m.l+'</span><span class="mono" style="font-size:12.5px;color:var(--muted)">'+fmtSetsNum(n)+' sets &nbsp; '+delta+'</span></div><div style="height:9px;border-radius:6px;background:var(--in);overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+c+';border-radius:6px"></div></div><div class="mono" style="font-size:10.5px;color:var(--faint);margin-top:4px">'+Math.round(vol[m.k].ton).toLocaleString('nl-BE')+' kg</div></div>';
  }).join('');
  const zeroLine=zero.length?'<div class="target-hint" style="margin-top:6px">Niet getraind: '+zero.map(function(m){return m.l;}).join(', ')+'</div>':'';
  const body=active.length===0?'<div class="empty">Geen sets gelogd in deze week.</div>':rows;
  return '<div class="stack">'
   +'<div style="display:flex;align-items:center;gap:8px"><button class="iconlink press" data-action="vol-close" aria-label="Terug">'+icon('cl',20,'var(--text)')+'</button><span style="font-size:20px;font-weight:700;color:var(--chalk)">Volume per spier</span></div>'
   +'<div class="datebar"><button class="arrow press" data-action="vol-prev" aria-label="Vorige week">'+icon('cl',20)+'</button><span style="font-size:15px;font-weight:700;color:var(--chalk)">'+weekRangeLabel(ref)+'</span><button class="arrow press'+(isCurrent?' disabled':'')+'" '+(isCurrent?'':'data-action="vol-next"')+' aria-label="Volgende week">'+icon('cr',20)+'</button></div>'
   +'<div class="card" style="display:flex;justify-content:space-around;text-align:center;padding:16px"><div><div class="mono" style="font-size:22px;color:var(--chalk)">'+fmtSetsNum(totalSetsW)+'</div><div style="font-size:11px;color:var(--muted)">werksets</div></div><div><div class="mono" style="font-size:22px;color:var(--chalk)">'+sessions.length+'</div><div style="font-size:11px;color:var(--muted)">sessies</div></div><div><div class="mono" style="font-size:22px;color:var(--chalk)">'+Math.round(totalTon).toLocaleString('nl-BE')+'</div><div style="font-size:11px;color:var(--muted)">kg totaal</div></div></div>'
   +'<div class="card">'+body+zeroLine+'</div>'
   +'<div class="target-hint">Volume = werksets per spier per week. <span style="color:var(--train)">Groen</span> 10–20 (typische groei-range), <span style="color:#F2B05E">oranje</span> lager, <span style="color:#FF7EC7">roze</span> hoger. De hoofdspier telt vol, een 2e spier telt half. Pas de toewijzing aan via Programma.</div>'
   +'</div>';
}

function doExport(){ try{ const blob=new Blob([JSON.stringify(S)],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='krachtboek-backup-'+todayStr()+'.json'; document.body.appendChild(a); a.click(); setTimeout(function(){ try{document.body.removeChild(a);}catch(e){} URL.revokeObjectURL(url); },150); }catch(e){ alert('Export mislukt: '+e); } }
function handleImport(e){ const file=e.target.files&&e.target.files[0]; e.target.value=''; if(!file)return; const reader=new FileReader(); reader.onload=function(ev){ try{ const parsed=JSON.parse(ev.target.result); if(!parsed||typeof parsed!=='object'||!('targets' in parsed)){ alert('Dit lijkt geen geldig Krachtboek-bestand.'); return; } if(!confirm('Huidige gegevens vervangen door deze back-up?'))return; S=Object.assign(JSON.parse(JSON.stringify(DEFAULTS)),parsed); if(!S.foodDate)S.foodDate=todayStr(); if(!S.foods)S.foods=seedFoods(); if(!S.program||!S.program.length)S.program=seedProgram(); save(); showSettings=false; foodsEdit=false; mealEdit=null; amountSheet=null; render(); alert('Back-up geïmporteerd.'); }catch(err){ alert('Importeren mislukt: '+err); } }; reader.readAsText(file); }

function handle(a,el){

    case 'tab': harvestAll(); S.tab=el.dataset.tab; progEdit=false; volumeView=false; progView=false; photoView=false; cardioView=false; foodsEdit=false; mealEdit=null; mealDelConfirm=false; planEdit=false; amountSheet=null; manualOpen=false; if(el.dataset.tab==='gewicht')S.weightDate=todayStr(); save(); render(); break;

    case 'hist-del-confirm': S.workouts=S.workouts.filter(w=>w.id!=el.dataset.id); pendingDel=null; save(); render(); break;

    case 'prog-open': progEdit=true; volumeView=false; progView=false; cardioView=false; pendingDelDay=null; render(); break;
    case 'vol-open': volumeView=true; progEdit=false; progView=false; cardioView=false; volWeek=todayStr(); render(); break;
    case 'progress-open': progView=true; volumeView=false; progEdit=false; cardioView=false; render(); break;
    case 'progress-close': progView=false; render(); break;
    case 'cardio-open': cardioView=true; volumeView=false; progView=false; progEdit=false; cardioWeek=todayStr(); render(); break;
    case 'cardio-close': cardioView=false; if(cardioInterval){clearInterval(cardioInterval);cardioInterval=null;} render(); break;
    case 'cardio-start': { var tm=S.cardioTimer||{accumMs:0}; tm.running=true; tm.startTs=Date.now(); S.cardioTimer=tm; save(); render(); break; }
    case 'cardio-pause': { var tp=S.cardioTimer; if(tp&&tp.running){ tp.accumMs=(tp.accumMs||0)+(Date.now()-tp.startTs); tp.running=false; tp.startTs=0; } if(cardioInterval){clearInterval(cardioInterval);cardioInterval=null;} save(); render(); break; }
    case 'cardio-reset': S.cardioTimer={running:false,startTs:0,accumMs:0}; if(cardioInterval){clearInterval(cardioInterval);cardioInterval=null;} save(); render(); break;
    case 'cardio-log': { var lsecs=Math.round(cardioElapsedMs()/1000); if(lsecs<1)break; var lkc=cardioKcal(cardioType,lsecs/60); S.cardio.push({id:uid(),date:todayStr(),type:cardioType,seconds:lsecs,kcal:lkc}); S.cardioTimer={running:false,startTs:0,accumMs:0}; if(cardioInterval){clearInterval(cardioInterval);cardioInterval=null;} save(); render(); break; }
    case 'cardio-mtoggle': cardioManualOpen=!cardioManualOpen; render(); break;
    case 'cardio-madd': { var mt=gv('cardio-m-type')||cardioType; var mins=+gv('cardio-m-min')||0; if(mins<=0){ var mi=document.getElementById('cardio-m-min'); if(mi)mi.focus(); break; } var mkRaw=gv('cardio-m-kcal'); var mk=(mkRaw===''||mkRaw==null)?cardioKcal(mt,mins):(+mkRaw||0); var md=gv('cardio-m-date')||todayStr(); S.cardio.push({id:uid(),date:md,type:mt,seconds:Math.round(mins*60),kcal:mk}); cardioManualOpen=false; save(); render(); break; }
    case 'cardio-week-prev': cardioWeek=shiftDate(cardioWeekRef(),-7); render(); break;
    case 'cardio-week-next': { var ccw=weekDates(todayStr()); var cnx=shiftDate(cardioWeekRef(),7); if(weekDates(cnx)[0]<=ccw[0]) cardioWeek=cnx; render(); break; }
    case 'cardio-del-ask': pendingDelCardio=el.dataset.id; render(); break;
    case 'cardio-del-cancel': pendingDelCardio=null; render(); break;
    case 'cardio-del-confirm': { var cid=el.dataset.id; S.cardio=S.cardio.filter(function(e){return e.id!=cid;}); pendingDelCardio=null; save(); render(); break; }
    case 'photo-open': photoView=true; photoMode='gallery'; pendingDelPhoto=null; render(); break;
    case 'photo-close': photoView=false; pendingDelPhoto=null; render(); break;
    case 'photo-pick': { var fi=document.getElementById('photo-file'); if(fi)fi.click(); break; }
    case 'photo-mode': photoMode=el.dataset.mode; pendingDelPhoto=null; if(photoMode==='compare'){ if(cmpA==null&&photoCache.length)cmpA=photoCache[0].id; if(cmpB==null&&photoCache.length)cmpB=photoCache[photoCache.length-1].id; } render(); break;
    case 'photo-del-ask': pendingDelPhoto=el.dataset.id; render(); break;
    case 'photo-del-cancel': pendingDelPhoto=null; render(); break;
    case 'photo-del-confirm': { var pid=el.dataset.id; idbDel(pid,function(){}); photoCache=photoCache.filter(function(p){return p.id!=pid;}); if(cmpA==pid)cmpA=null; if(cmpB==pid)cmpB=null; pendingDelPhoto=null; render(); break; }
    case 'vol-close': volumeView=false; render(); break;
    case 'vol-prev': volWeek=shiftDate(volWeekRef(),-7); render(); break;
    case 'vol-next': { var cw=weekDates(todayStr()); var nx=shiftDate(volWeekRef(),7); if(weekDates(nx)[0]<=cw[0]) volWeek=nx; render(); break; }
    case 'prog-done': harvestProgram(); progEdit=false; pendingDelDay=null; save(); render(); break;
    case 'pe-type': harvestProgram(); { const d=S.program.find(x=>x.id==el.dataset.pday); if(d)d.type=el.dataset.type; save(); render(); break; }
    case 'pe-addex': harvestProgram(); addProgramExercise(el.dataset.pday, gv('padd-'+el.dataset.pday)); break;
    case 'pe-delex': harvestProgram(); { const d=S.program.find(x=>x.id==el.dataset.pday); if(d)d.exercises=d.exercises.filter(e=>e.id!=el.dataset.ex); save(); render(); break; }
    case 'pe-exup': harvestProgram(); { const d=S.program.find(x=>x.id==el.dataset.pday); if(d){ const i=d.exercises.findIndex(e=>e.id==el.dataset.ex); if(i>0){ const tmp=d.exercises[i-1]; d.exercises[i-1]=d.exercises[i]; d.exercises[i]=tmp; } } save(); render(); break; }
    case 'pe-exdown': harvestProgram(); { const d=S.program.find(x=>x.id==el.dataset.pday); if(d){ const i=d.exercises.findIndex(e=>e.id==el.dataset.ex); if(i>=0&&i<d.exercises.length-1){ const tmp=d.exercises[i+1]; d.exercises[i+1]=d.exercises[i]; d.exercises[i]=tmp; } } save(); render(); break; }
    case 'pe-addday': harvestProgram(); S.program.push({id:uid(),name:'Nieuwe dag',type:'Lower',exercises:[]}); save(); render(); break;
    case 'pe-delday-ask': pendingDelDay=el.dataset.pday; render(); break;
    case 'pe-delday-cancel': pendingDelDay=null; render(); break;
    case 'pe-delday-confirm': harvestProgram(); S.program=S.program.filter(d=>d.id!=el.dataset.pday); pendingDelDay=null; save(); render(); break;
  }
}

document.body.addEventListener('click',function(e){ if(e.target){ if(e.target.id==='overlay'){ handle('close-settings'); return; } if(e.target.id==='amt-overlay'){ handle('amt-cancel'); return; } } const act=e.target.closest('[data-action]'); if(!act)return; handle(act.dataset.action,act); });
document.body.addEventListener('input',function(e){ const t=e.target; if(!t)return; if(t.id==='ex-input'){ updateSuggestions(t.value); return; } if(t.id==='food-search'){ const box=document.getElementById('food-results'); if(box)box.innerHTML=foodResultsHTML(t.value); return; } if(t.id==='amt-input'){ if(amountSheet){ amountSheet.amount=t.value; const f=foodById(amountSheet.foodId); const box=document.getElementById('amt-preview'); if(box&&f)box.textContent=amtPreviewHTML(f,t.value); } return; } if(t.id==='f-pro'||t.id==='f-carb'||t.id==='f-fat'){ kcalManual=false; recomputeKcal(); return; } if(t.id==='f-cal'){ kcalManual=true; return; } if(t.id==='cmp-range'){ cmpPos=+t.value; var ctop=document.getElementById('cmp-top'); var cline=document.getElementById('cmp-line'); if(ctop)ctop.style.clipPath='inset(0 '+(100-cmpPos)+'% 0 0)'; if(cline)cline.style.left=cmpPos+'%'; return; } });
document.body.addEventListener('keydown',function(e){ const t=e.target; if(!t)return; if(t.id==='ex-input'&&e.key==='Enter'){ e.preventDefault(); harvestEditor(); if((t.value||'').trim()){ S.activeWorkout.exercises.push({id:uid(),name:t.value.trim(),sets:[{id:uid(),weight:'',reps:'',rir:''}]}); save(); render(); const i=document.getElementById('ex-input'); if(i)i.focus(); } } else if(t.id&&t.id.indexOf('padd-')===0&&e.key==='Enter'){ e.preventDefault(); harvestProgram(); addProgramExercise(t.id.slice(5), t.value); } else if(t.id==='w-input'&&e.key==='Enter'){ e.preventDefault(); handle('w-save',{dataset:{}}); } });
document.body.addEventListener('change',function(e){ var t=e.target; if(!t)return; if(t.id==='import-file'){ handleImport(e); return; } if(t.id==='photo-file'){ var pf=t.files&&t.files[0]; if(pf)addPhotoFromFile(pf); t.value=''; return; } if(t.dataset&&t.dataset.progex){ progEx=t.value; render(); return; } if(t.dataset&&t.dataset.photodate){ var pd=photoById(t.dataset.photodate); if(pd&&t.value){ pd.date=t.value; idbPut(pd,function(){}); photoCache.sort(photoSort); render(); } return; } if(t.dataset&&t.dataset.cmp){ if(t.dataset.cmp==='a')cmpA=t.value; else cmpB=t.value; render(); return; } if(t.dataset&&t.dataset.cardiotype){ cardioType=t.value; render(); return; } if(t.dataset&&t.dataset.cardiokcal){ var ce=S.cardio.find(function(x){return x.id==t.dataset.cardiokcal;}); if(ce){ ce.kcal=+t.value||0; save(); render(); } return; } if(t.dataset&&t.dataset.slot){ harvestPlan(); if(t.dataset.sf==='meal'){ var sl=S.schedule.find(function(x){return x.id==t.dataset.slot;}); if(sl)sl.mealId=t.value||''; } save(); render(); return; } if(t.dataset&&'mi' in t.dataset){ harvestMeal(); render(); return; } if(t.dataset&&t.dataset.mg){ harvestProgram(); var ex=findExerciseById(t.dataset.mg); if(ex){ if(t.dataset.mgslot==='muscle2') ex.muscle2=t.value; else ex.muscle=t.value; } save(); render(); } });

function updateSuggestions(text){ const box=document.getElementById('ex-sug'); if(!box)return; text=(text||'').trim().toLowerCase(); if(!text){ box.innerHTML=''; return; } const sug=exNames().filter(e=>e.toLowerCase().includes(text)&&e.toLowerCase()!==text).slice(0,5); box.innerHTML=sug.map(s=>'<button class="chip chip-train press" data-action="wo-addex-sug" data-name="'+esc(s)+'">'+esc(s)+'</button>').join(''); }

render();
loadPhotos();
</script>
</body>
